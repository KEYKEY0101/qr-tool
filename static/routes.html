<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車線速查</title>
<style>
:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #1f2937;
    --text-dim: #6b7280;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --danger: #dc2626;
    --border: #e5e7eb;
    --input-bg: #ffffff;
    --hover-row: #eff6ff;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
}
[data-theme="dark"] {
    --bg: #111827;
    --card: #1f2937;
    --text: #f3f4f6;
    --text-dim: #9ca3af;
    --primary: #3b82f6;
    --primary-hover: #60a5fa;
    --danger: #f87171;
    --border: #374151;
    --input-bg: #111827;
    --hover-row: #1e3a5f;
    --shadow: 0 1px 3px rgba(0,0,0,.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
}
nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
nav a {
    text-decoration: none;
    color: var(--text-dim);
    font-size: .95rem;
    padding: 6px 12px;
    border-radius: 8px;
    white-space: nowrap;
}
nav a.active { color: var(--primary); background: var(--hover-row); font-weight: bold; }
nav a:hover { color: var(--primary); }
.icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    color: var(--text);
    font-size: .85rem;
}
.container { max-width: 900px; margin: 0 auto; padding: 16px; display: grid; gap: 16px; }
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    box-shadow: var(--shadow);
}
.card h2 { font-size: 1.05rem; margin-bottom: 14px; }
#searchInput {
    width: 100%;
    font-size: 1.25rem;
    padding: 13px 16px;
    border: 2px solid var(--primary);
    border-radius: 12px;
    background: var(--input-bg);
    color: var(--text);
}
#searchInput:focus { outline: none; }
.route-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 8px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    border-radius: 8px;
}
.route-row:hover { background: var(--hover-row); }
.route-row:last-child { border-bottom: none; }
.route-name {
    font-weight: bold;
    font-size: 1.1rem;
    color: var(--primary);
    white-space: nowrap;
    min-width: 60px;
}
.route-body { flex: 1; min-width: 0; }
.route-content {
    color: var(--text);
    font-size: .92rem;
    white-space: pre-wrap;
    word-break: break-all;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.route-thumbs { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.route-thumbs img {
    width: 52px; height: 52px; object-fit: cover;
    border-radius: 6px; border: 1px solid var(--border);
}
.mini-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--danger);
    cursor: pointer;
    padding: 5px 9px;
    font-size: .9rem;
}
#emptyMsg { text-align: center; color: var(--text-dim); padding: 24px; display: none; }
.form-grid { display: grid; gap: 10px; }
.form-grid input, .form-grid textarea {
    width: 100%;
    font-size: 1rem;
    padding: 11px 13px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--input-bg);
    color: var(--text);
    font-family: inherit;
}
.form-grid textarea { min-height: 90px; resize: vertical; }
.form-grid input:focus, .form-grid textarea:focus { outline: none; border-color: var(--primary); }
.photo-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
.photo-btn {
    border: 2px dashed var(--border);
    border-radius: 10px;
    background: none;
    color: var(--text-dim);
    padding: 10px 16px;
    cursor: pointer;
    font-size: .9rem;
}
.photo-btn:hover { border-color: var(--primary); color: var(--primary); }
#previews { display: flex; gap: 8px; flex-wrap: wrap; }
#previews img {
    width: 58px; height: 58px; object-fit: cover;
    border-radius: 8px; border: 1px solid var(--border); cursor: pointer;
}
.btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 26px;
    font-size: 1.05rem;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
}
.btn:hover { background: var(--primary-hover); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.detail-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 40;
    overflow-y: auto;
    padding: 20px 12px 40px;
}
.detail-overlay.show { display: block; }
.detail-panel {
    max-width: 680px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
}
.detail-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.detail-top h2 { font-size: 1.25rem; color: var(--primary); flex: 1; word-break: break-all; }
.d-content {
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 1rem;
    line-height: 1.7;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
}
.d-photo-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin: 16px 0 10px; }
.d-photo-head h3 { font-size: .95rem; color: var(--text-dim); }
.detail-photos { display: flex; gap: 10px; flex-wrap: wrap; }
.dp-item { position: relative; }
.dp-item img {
    width: 130px; height: 130px; object-fit: cover;
    border-radius: 10px; border: 1px solid var(--border); cursor: pointer;
}
.dp-item .dp-rm {
    position: absolute; top: -7px; right: -7px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--danger);
    cursor: pointer;
    font-size: .72rem;
    width: 22px; height: 22px;
    line-height: 1;
}
.edit-sec { margin-top: 18px; }
.edit-sec h3 { font-size: .95rem; color: var(--text-dim); margin-bottom: 10px; }
.edit-btns { display: flex; gap: 10px; }
.edit-btns .btn { margin-top: 0; }
.btn-del {
    background: none;
    border: 2px solid var(--danger);
    color: var(--danger);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 1rem;
    cursor: pointer;
    white-space: nowrap;
}
.overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.82);
    z-index: 60;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    padding: 12px;
}
.overlay.show { display: flex; }
.overlay img { max-width: 96vw; max-height: 84vh; border-radius: 10px; background: #fff; }
.overlay .cap { color: #fff; font-size: 1.05rem; font-weight: bold; word-break: break-all; text-align: center; }
#toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    padding: 10px 20px; border-radius: 10px; font-size: .9rem;
    opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 90vw;
    z-index: 99;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
    <nav>
        <a href="/">📦 二維碼生成器</a>
        <a href="/favorites">⭐ 常用二維碼</a>
        <a href="/returns">↩️ 退貨記錄</a>
        <a href="/accounts">🔑 帳號密碼</a>
        <a href="/routes" class="active">🚚 車線</a>
        <a href="/sameday">📤 Same Day</a>
    </nav>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙 深色</button>
</header>

<div class="container">
    <div class="card">
        <input id="searchInput" type="text" placeholder="🔍 輸入左邊號碼搜尋（New M18）" autocomplete="off" autofocus>
    </div>

    <div class="card">
        <h2>🚚 車線列表（點擊看詳細）</h2>
        <div id="routeList"></div>
        <div id="emptyMsg">尚無車線資料</div>
    </div>

    <div class="card">
        <h2>➕ 新增車線</h2>
        <div class="form-grid">
            <input id="rName" type="text" placeholder="車線名稱／號碼（例如：68）" autocomplete="off">
            <textarea id="rContent" placeholder="內容（涵蓋地區、店號、關鍵字…之後搜尋就靠這些字）"></textarea>
        </div>
        <div class="photo-row">
            <button class="photo-btn" onclick="$('rFiles').click()">📷 加入相片（車線表）</button>
            <input id="rFiles" type="file" accept="image/*" multiple style="display:none">
            <div id="previews"></div>
        </div>
        <button class="btn" id="addBtn" onclick="addRoute()">新增車線</button>
    </div>
</div>

<div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel">
        <div class="detail-top">
            <h2 id="dName"></h2>
            <button class="icon-btn" onclick="closeDetail()">✕ 關閉</button>
        </div>
        <div class="d-content" id="dContent"></div>
        <div class="d-photo-head">
            <h3>📷 相片（點擊放大）</h3>
            <button class="photo-btn" onclick="$('dFiles').click()">📷 加入相片</button>
            <input id="dFiles" type="file" accept="image/*" multiple style="display:none">
        </div>
        <div class="detail-photos" id="dPhotos"></div>
        <div class="edit-sec">
            <h3>✏️ 修改</h3>
            <div class="form-grid">
                <input id="eName" type="text" placeholder="車線名稱" autocomplete="off">
                <textarea id="eContent" placeholder="內容"></textarea>
            </div>
            <div class="edit-btns" style="margin-top:10px">
                <button class="btn" onclick="saveEdit()">💾 儲存修改</button>
                <button class="btn-del" onclick="delRoute()">🗑 刪除</button>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="this.classList.remove('show')">
    <img id="overlayImg" src="" alt="">
    <div class="cap" id="overlayCap"></div>
</div>
<div id="toast"></div>

<script src="/static/photo-compress.js"></script>
<script>
const $ = id => document.getElementById(id);
let routes = [];
let detailId = null;
let pendingFiles = [];

function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    $('themeBtn').textContent = t === 'dark' ? '☀️ 淺色' : '🌙 深色';
    localStorage.setItem('appTheme', t);
}
function toggleTheme() {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('appTheme') || 'light');

let loadSeq = 0;
async function loadRoutes() {
    const q = $('searchInput').value.trim();
    const seq = ++loadSeq;
    try {
        const res = await fetch('/api/routes?q=' + encodeURIComponent(q));
        const data = await res.json();
        if (seq !== loadSeq) return;
        if (!res.ok || !Array.isArray(data.routes)) return;
        if (data.db_ok === false) {
            $('emptyMsg').textContent = '⚠ 資料庫未連線';
            $('emptyMsg').style.display = 'block';
            return;
        }
        routes = data.routes;
        const list = $('routeList');
        list.innerHTML = '';
        $('emptyMsg').textContent = q ? '找不到符合的車線' : '尚無車線資料';
        $('emptyMsg').style.display = routes.length ? 'none' : 'block';
        for (const r of routes) {
            const row = document.createElement('div');
            row.className = 'route-row';
            const name = document.createElement('div');
            name.className = 'route-name';
            name.textContent = r.name;
            const body = document.createElement('div');
            body.className = 'route-body';
            const content = document.createElement('div');
            content.className = 'route-content';
            content.textContent = r.content;
            body.appendChild(content);
            if (r.images.length) {
                const th = document.createElement('div');
                th.className = 'route-thumbs';
                for (const rel of r.images.slice(0, 4)) {
                    const img = document.createElement('img');
                    img.src = '/uploads/' + rel;
                    img.loading = 'lazy';
                    th.appendChild(img);
                }
                body.appendChild(th);
            }
            const del = document.createElement('button');
            del.className = 'mini-btn';
            del.textContent = '✕';
            del.onclick = ev => { ev.stopPropagation(); quickDelete(r); };
            row.appendChild(name);
            row.appendChild(body);
            row.appendChild(del);
            row.onclick = () => openDetail(r.id);
            list.appendChild(row);
        }
        if (detailId !== null) renderDetail();
    } catch (e) {
        showToast('載入失敗：' + e.message);
    }
}

// ---------- 新增 ----------
$('rFiles').addEventListener('change', () => {
    for (const f of $('rFiles').files) pendingFiles.push(f);
    $('rFiles').value = '';
    renderPreviews();
});
function renderPreviews() {
    const box = $('previews');
    box.querySelectorAll('img').forEach(img => URL.revokeObjectURL(img.src));
    box.innerHTML = '';
    pendingFiles.forEach((f, i) => {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(f);
        img.title = '點擊移除';
        img.onclick = () => { pendingFiles.splice(i, 1); renderPreviews(); };
        box.appendChild(img);
    });
}

async function addRoute() {
    const name = $('rName').value.trim();
    const content = $('rContent').value.trim();
    if (!name) { showToast('請輸入車線名稱'); return; }
    $('addBtn').disabled = true;
    $('addBtn').textContent = '上傳中…';
    try {
        const fd = new FormData();
        fd.append('name', name);
        fd.append('content', content);
        const compressed = await compressPhotos(pendingFiles);
        compressed.forEach(f => fd.append('files', f));
        const res = await uploadWithTimeout('/api/routes', {method: 'POST', body: fd});
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        showToast('已新增車線');
        $('rName').value = ''; $('rContent').value = '';
        pendingFiles = [];
        renderPreviews();
        loadRoutes();
    } catch (e) {
        showToast('新增失敗：' + e.message);
    } finally {
        $('addBtn').disabled = false;
        $('addBtn').textContent = '新增車線';
    }
}

// ---------- 詳細 ----------
function openDetail(id) {
    detailId = id;
    renderDetail();
    $('detailOverlay').classList.add('show');
}
function closeDetail() {
    detailId = null;
    $('detailOverlay').classList.remove('show');
}
function renderDetail() {
    const r = routes.find(x => x.id === detailId);
    if (!r) { closeDetail(); return; }
    $('dName').textContent = '🚚 ' + r.name;
    $('dContent').textContent = r.content || '（沒有內容）';
    $('eName').value = r.name;
    $('eContent').value = r.content;
    const ph = $('dPhotos');
    ph.innerHTML = '';
    for (const rel of r.images) {
        const item = document.createElement('div');
        item.className = 'dp-item';
        const img = document.createElement('img');
        img.src = '/uploads/' + rel;
        img.loading = 'lazy';
        img.onclick = () => showImage('/uploads/' + rel, r.name);
        const rm = document.createElement('button');
        rm.className = 'dp-rm';
        rm.textContent = '✕';
        rm.onclick = () => delPhoto(r, rel);
        item.appendChild(img);
        item.appendChild(rm);
        ph.appendChild(item);
    }
}

$('dFiles').addEventListener('change', async e => {
    if (detailId === null || !e.target.files.length) return;
    const id = detailId;
    const picked = [...e.target.files];
    e.target.value = '';
    showToast(`已選 ${picked.length} 張相片，壓縮中…`);
    const files = await compressPhotos(picked);
    const fd = new FormData();
    for (const f of files) fd.append('files', f);
    showToast('上傳中…');
    try {
        const res = await uploadWithTimeout(`/api/routes/${id}/images`, {method: 'POST', body: fd});
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        showToast('已加入相片');
        await loadRoutes();
    } catch (err) {
        showToast('上傳失敗：' + err.message);
    }
});

async function delPhoto(r, rel) {
    if (!confirm('確定刪除這張相片？')) return;
    try {
        const res = await fetch(
            `/api/routeimg?record_id=${r.id}&filename=${encodeURIComponent(rel)}`,
            {method: 'DELETE'}
        );
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        showToast('已刪除相片');
        await loadRoutes();
    } catch (e) {
        showToast('刪除失敗：' + e.message);
    }
}

async function saveEdit() {
    if (detailId === null) return;
    const name = $('eName').value.trim();
    const content = $('eContent').value.trim();
    if (!name) { showToast('車線名稱不能為空'); return; }
    try {
        const res = await fetch(`/api/routes/${detailId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, content})
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        showToast('已儲存修改');
        closeDetail();
        loadRoutes();
    } catch (e) {
        showToast('儲存失敗：' + e.message);
    }
}

async function delRoute() {
    if (detailId === null) return;
    const r = routes.find(x => x.id === detailId);
    if (!confirm(`確定刪除車線「${r ? r.name : ''}」？相片也會一併刪除。`)) return;
    try {
        const res = await fetch(`/api/routes/${detailId}`, {method: 'DELETE'});
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        showToast('已刪除');
        closeDetail();
        loadRoutes();
    } catch (e) {
        showToast('刪除失敗：' + e.message);
    }
}

async function quickDelete(r) {
    if (!confirm(`確定刪除車線「${r.name}」？相片也會一併刪除。`)) return;
    try {
        const res = await fetch(`/api/routes/${r.id}`, {method: 'DELETE'});
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        showToast('已刪除');
        if (detailId === r.id) closeDetail();
        loadRoutes();
    } catch (e) {
        showToast('刪除失敗：' + e.message);
    }
}

function showImage(src, cap) {
    $('overlayImg').src = src;
    $('overlayCap').textContent = cap;
    $('overlay').classList.add('show');
}

function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

let searchTimer;
$('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadRoutes, 200);
});
$('detailOverlay').addEventListener('click', e => {
    if (e.target === $('detailOverlay')) closeDetail();
});

loadRoutes();
</script>
<script src="/static/pull-refresh.js"></script>
</body>
</html>
